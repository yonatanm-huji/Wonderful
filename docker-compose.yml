# After: docker-compose up --build
# Open in browser: http://localhost:5001
services:
  pharmacy-agent:
    build: .
    ports:
      - "5001:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
